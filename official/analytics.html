<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics & Transparency - Road Damage Detection</title>

    <link rel="stylesheet" href="../shared/styles.css">
    <link rel="stylesheet" href="styles/dashboard.css">
    <link rel="stylesheet" href="styles/analytics.css">
</head>

<body>

    <!-- Top Bar / Header -->
    <header class="header">
        <div class="logo-area">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 11V1m16 10V1M12 23V1M4 23v-7m16 7v-7" />
                </svg>
            </div>
            <span class="logo-text">SafeStreets</span>
        </div>

        <nav class="nav-links">
            <a href="dashboard.html" class="nav-item">Dashboard</a>
            <a href="work-reports.html" class="nav-item">Reports</a>
            <a href="analytics.html" class="nav-item active">Analytics</a>
        </nav>

        <div class="header-right">
            <button class="icon-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
            </button>
            <div class="profile-section" onclick="toggleProfileMenu()">
                <div class="profile-info">
                    <span class="profile-name user-name">Officer Jenkins</span>
                    <span class="profile-role user-role">District 4 Admin</span>
                </div>
                <div class="profile-avatar">
                    <img id="headerAvatar"
                        src="https://ui-avatars.com/api/?name=Officer+Jenkins&background=f1f5f9&color=64748b"
                        alt="Avatar">
                </div>
                <!-- Profile Menu (Hidden) -->
                <div class="profile-menu" id="profileMenu">
                    <button class="menu-item logout" onclick="confirmLogout()">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="container">

        <!-- Filters -->
        <div class="analytics-filters">
            <h2>Filters</h2>
            <div class="filters-grid">
                <div class="form-group">
                    <label class="form-label">Time Period</label>
                    <select class="form-select" id="timeFilter">
                        <option value="30">Last Month</option>
                        <option value="90" selected>Last 3 Months</option>
                        <option value="180">Last 6 Months</option>
                        <option value="365">Last Year</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Sector</label>
                    <select class="form-select" id="sectorFilter">
                        <option value="">All Sectors</option>
                    </select>
                </div>

                <div class="form-group">
                    <button class="btn btn-secondary" onclick="exportReport()">Export Report</button>
                </div>
            </div>
        </div>

        <!-- Summary Stats -->
        <div class="analytics-section">
            <h2>Summary Statistics</h2>
            <div class="stats-grid" id="summaryStats"></div>
        </div>

        <!-- Repair Time -->
        <div class="analytics-section">
            <h2>Average Repair Time (Days)</h2>
            <div class="stat-card">
                <div class="chart-bars" id="repairTimeChart"></div>
            </div>
        </div>

        <!-- Contractor Performance -->
        <div class="analytics-section">
            <h2>Contractor Performance</h2>
            <div class="stat-card">
                <div id="contractorPerformance"></div>
            </div>
        </div>

        <!-- Road Health Index -->
        <div class="analytics-section">
            <h2>Road Health Index by Sector</h2>
            <div class="stat-card">
                <div class="health-index-grid" id="roadHealthGrid"></div>
            </div>
        </div>

    </div>

    <script src="../shared/navigation.js"></script>
    <script src="../shared/auth.js"></script>
    <script src="../shared/modal.js"></script>
    <script src="scripts/analytics.js"></script>

</body>

</html>
